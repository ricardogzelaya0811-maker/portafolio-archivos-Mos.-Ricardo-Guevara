```html
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portal MOS 2026</title>

<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
  margin:0;
  font-family:'DM Sans',sans-serif;
  background:#f5f5f5;
}

header{
  background:#0D1B2A;
  color:white;
  padding:20px;
  text-align:center;
}

.container{
  max-width:1100px;
  margin:auto;
  padding:30px;
}

.card{
  background:white;
  padding:20px;
  border-radius:12px;
  box-shadow:0 4px 15px rgba(0,0,0,.08);
  margin-bottom:20px;
}

input,textarea,select{
  width:100%;
  padding:12px;
  margin-top:8px;
  margin-bottom:16px;
  border-radius:8px;
  border:1px solid #ccc;
  box-sizing:border-box;
}

button{
  background:#C9A84C;
  color:#0D1B2A;
  border:none;
  padding:12px 18px;
  border-radius:8px;
  font-weight:bold;
  cursor:pointer;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
  gap:20px;
}

.doc{
  background:white;
  border-radius:12px;
  overflow:hidden;
  box-shadow:0 4px 15px rgba(0,0,0,.08);
}

.thumb{
  height:120px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:50px;
  color:white;
}

.word{
  background:#1B5EAB;
}

.excel{
  background:#217346;
}

.doc-body{
  padding:15px;
}

.doc-title{
  font-weight:700;
  margin-bottom:10px;
}

.actions{
  display:flex;
  gap:10px;
  margin-top:15px;
}

.actions a,
.actions button{
  flex:1;
  text-align:center;
  text-decoration:none;
}

.delete{
  background:#cc2222;
  color:white;
}
</style>
</head>
<body>

<header>
<h1>📂 Portal MOS 2026</h1>
<p>Ricardo Zelaya</p>
</header>

<div class="container">

<div class="card">
<h2>⬆️ Subir Documento</h2>

<input type="file" id="fileInput" accept=".docx,.xlsx">

<input type="text" id="titulo" placeholder="Título del documento">

<input type="text" id="autor" placeholder="Autor">

<select id="tipo">
<option value="">Selecciona tipo</option>
<option value="word">Word</option>
<option value="excel">Excel</option>
</select>

<textarea id="descripcion" placeholder="Descripción"></textarea>

<button onclick="uploadDoc()">Subir Archivo</button>
</div>

<h2>📚 Mis Documentos</h2>

<div class="grid" id="docsGrid"></div>

</div>

<script>

const SUPABASE_URL = "https://mvzwipqnzeqvnbkkbshn.supabase.co";
const SUPABASE_KEY = "sb_publishable_rC_MRTrw45InbL1FcTScKQ_wuR3PiBm";

const supabase = window.supabase.createClient(
  SUPABASE_URL,
  SUPABASE_KEY
);

async function uploadDoc(){

  const file = document.getElementById('fileInput').files[0];
  const titulo = document.getElementById('titulo').value;
  const autor = document.getElementById('autor').value;
  const tipo = document.getElementById('tipo').value;
  const descripcion = document.getElementById('descripcion').value;

  if(!file){
    alert('Selecciona un archivo');
    return;
  }

  const fileName = Date.now() + '_' + file.name;

  const { error: uploadError } = await supabase.storage
    .from('documentos')
    .upload(fileName, file);

  if(uploadError){
    console.log(uploadError);
    alert('Error subiendo archivo');
    return;
  }

  const { data } = supabase.storage
    .from('documentos')
    .getPublicUrl(fileName);

  const publicURL = data.publicUrl;

  const { error: dbError } = await supabase
    .from('documentos')
    .insert([
      {
        titulo: titulo,
        autor: autor,
        descripcion: descripcion,
        tipo: tipo,
        archivo: fileName,
        url: publicURL
      }
    ]);

  if(dbError){
    console.log(dbError);
    alert('Error guardando en base de datos');
    return;
  }

  alert('Archivo subido correctamente');

  document.getElementById('fileInput').value = '';
  document.getElementById('titulo').value = '';
  document.getElementById('autor').value = '';
  document.getElementById('tipo').value = '';
  document.getElementById('descripcion').value = '';

  loadDocs();
}

async function loadDocs(){

  const { data, error } = await supabase
    .from('documentos')
    .select('*')
    .order('created_at', { ascending:false });

  if(error){
    console.log(error);
    return;
  }

  const grid = document.getElementById('docsGrid');

  if(!data.length){
    grid.innerHTML = '<p>No hay documentos.</p>';
    return;
  }

  grid.innerHTML = data.map(doc => `

    <div class="doc">

      <div class="thumb ${doc.tipo}">
        ${doc.tipo === 'word' ? '📄' : '📊'}
      </div>

      <div class="doc-body">

        <div class="doc-title">
          ${doc.titulo}
        </div>

        <p>${doc.descripcion || ''}</p>

        <small>👤 ${doc.autor}</small>

        <div class="actions">

          <a href="${doc.url}" target="_blank">
            <button>Descargar</button>
          </a>

          <button class="delete"
            onclick="deleteDoc('${doc.id}','${doc.archivo}')">
            Eliminar
          </button>

        </div>

      </div>

    </div>

  `).join('');
}

async function deleteDoc(id, archivo){

  if(!confirm('¿Eliminar documento?')){
    return;
  }

  await supabase.storage
    .from('documentos')
    .remove([archivo]);

  await supabase
    .from('documentos')
    .delete()
    .eq('id', id);

  loadDocs();
}

loadDocs();

</script>

</body>
</html>
