<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ricardo Zelaya — Portal MOS 2026</title>

  <link rel="icon" id="favicon" type="image/png"/>
  <meta name="description" content="Portafolio profesional MOS de Ricardo Zelaya — Especialista en Microsoft Office + IA. El Salvador 2026."/>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>

  <style>
    :root {
      --gold:#C9A84C; --gold-lt:#E8D4A0; --gold-dk:#8B6914;
      --navy:#0D1B2A; --navy2:#1A2F45;
      --bg:    #FAF7F0;
      --bg2:   #F0EBE0;
      --card:  #ffffff;
      --text:  #0D1B2A;
      --muted: #5A6070;
      --border:rgba(0,0,0,.07);
      --shadow:0 4px 24px rgba(13,27,42,.10);
      --r:14px; --rs:8px;
      --ease:.3s cubic-bezier(.4,0,.2,1);
    }
    [data-theme="dark"] {
      --bg:    #0f1923;
      --bg2:   #162030;
      --card:  #1a2535;
      --text:  #e8e4dc;
      --muted: #8a95a3;
      --border:rgba(255,255,255,.07);
      --shadow:0 4px 24px rgba(0,0,0,.35);
    }

    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{scroll-behavior:smooth}
    body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);line-height:1.7;transition:background var(--ease),color var(--ease)}

    /* SPLASH */
    #splash{position:fixed;inset:0;z-index:9999;background:var(--navy);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1.25rem;transition:opacity .5s ease}
    .splash-logo{width:80px;height:80px;border-radius:50%;background:linear-gradient(135deg,var(--gold),var(--gold-lt));display:flex;align-items:center;justify-content:center;font-family:'Playfair Display',serif;font-size:2rem;font-weight:900;color:var(--navy);animation:pulse 1.2s ease infinite}
    .splash-txt{color:rgba(255,255,255,.6);font-size:.85rem;letter-spacing:.1em;text-transform:uppercase}
    .splash-bar{width:180px;height:3px;background:rgba(255,255,255,.1);border-radius:2px;overflow:hidden}
    .splash-fill{height:100%;background:var(--gold);border-radius:2px;animation:load 1.2s ease forwards}
    @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}
    @keyframes load{from{width:0}to{width:100%}}

    /* LOGIN */
    #loginScreen{min-height:100vh;background:linear-gradient(135deg,#060f1e,#0D1B2A 55%,#0f2544);display:none;align-items:center;justify-content:center;padding:1.5rem}
    .lc{display:grid;grid-template-columns:1fr 1fr;max-width:860px;width:100%;min-height:520px;border-radius:24px;overflow:hidden;box-shadow:0 32px 90px rgba(0,0,0,.55)}
    .lc-left{background:linear-gradient(160deg,#1B5EAB,#0a1e3d);padding:3rem 2.5rem;display:flex;flex-direction:column;justify-content:space-between;position:relative;overflow:hidden}
    .lc-badge{display:inline-block;background:rgba(201,168,76,.18);border:1px solid rgba(201,168,76,.45);color:var(--gold-lt);font-size:.72rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:.4rem 1rem;border-radius:100px;margin-bottom:1.4rem}
    .lc-left h2{font-family:'Playfair Display',serif;color:#fff;font-size:1.7rem;font-weight:700;line-height:1.2;margin-bottom:.9rem}
    .lc-left h2 em{color:var(--gold);font-style:normal}
    .lc-feats{list-style:none;display:flex;flex-direction:column;gap:.55rem}
    .lc-feats li{color:rgba(255,255,255,.8);font-size:.84rem;background:rgba(255,255,255,.07);border-left:3px solid var(--gold);padding:.55rem 1rem;border-radius:6px}
    .lc-right{background:#fff;display:flex;align-items:center;justify-content:center;padding:2.5rem 2rem}
    .lc-form{width:100%;max-width:300px}
    .lc-ava{width:84px;height:84px;border-radius:50%;overflow:hidden;border:3px solid var(--gold);margin:0 auto 1.2rem}
    .lc-title{font-family:'Playfair Display',serif;font-size:1.6rem;font-weight:700;color:#0D1B2A;text-align:center;margin-bottom:.2rem}
    .lc-field{margin-bottom:.9rem}
    .lc-field input{width:100%;background:#f3f6fc;border:1.5px solid #dde3f0;border-radius:8px;padding:.7rem 1rem;font-size:.9rem}
    .lc-btn{width:100%;padding:.8rem;background:linear-gradient(135deg,#1B5EAB,#2B7CD3);color:#fff;border:none;border-radius:8px;font-weight:700;cursor:pointer}
    .lc-err{display:none;color:#c00;background:#fff0f0;padding:.5rem;text-align:center;border-radius:6px}

    /* Topbar y demás estilos resumidos para que funcione */
    .topbar{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(250,247,240,.95);padding:1rem 2rem;display:flex;justify-content:space-between;align-items:center}
    .page{display:none;padding-top:70px;min-height:100vh}
    .page.active{display:block}
    .btn-gold{background:var(--gold);color:var(--navy);padding:12px 28px;border-radius:50px;font-weight:700;cursor:pointer}
  </style>
</head>
<body>

<!-- SPLASH -->
<div id="splash">
  <div class="splash-logo">RZ</div>
  <p class="splash-txt">Portal MOS 2026</p>
  <div class="splash-bar"><div class="splash-fill"></div></div>
</div>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="lc">
    <div class="lc-left">
      <div>
        <span class="lc-badge">🎓 Portal MOS 2026</span>
        <h2>Portafolio Profesional<br><em>Ricardo Zelaya</em></h2>
      </div>
    </div>
    <div class="lc-right">
      <div class="lc-form">
        <h1 class="lc-title">Iniciar Sesión</h1>
        <div class="lc-field">
          <input type="password" id="loginPass" placeholder="Escribe tu contraseña…" onkeydown="if(event.key==='Enter')doLogin()"/>
        </div>
        <p class="lc-err" id="loginErr">❌ Contraseña incorrecta</p>
        <button class="lc-btn" onclick="doLogin()">Ingresar al Portal →</button>
      </div>
    </div>
  </div>
</div>

<!-- APP -->
<div id="app" style="display:none">
  <h1 style="text-align:center;padding:40px">Ricardo Zelaya - Portafolio MOS 2026</h1>
  <div style="text-align:center">
    <button onclick="showPage('home')" class="btn-gold">Inicio</button>
    <button onclick="showPage('descargas')" class="btn-gold">Descargas</button>
    <button onclick="showPage('subir')" class="btn-gold">Subir Archivo</button>
    <button onclick="showPage('contacto')" class="btn-gold">Contacto</button>
  </div>

  <!-- HOME -->
  <div id="page-home" class="page active" style="padding:40px;text-align:center">
    <h2>Bienvenido a mi Portafolio</h2>
    <p>Especialista en Microsoft Office + IA</p>
  </div>

  <!-- DESCARGAS -->
  <div id="page-descargas" class="page" style="padding:40px">
    <h2>Mis Documentos</h2>
    <div id="dlGrid" style="margin-top:20px"></div>
  </div>

  <!-- SUBIR -->
  <div id="page-subir" class="page" style="padding:40px">
    <h2>Subir Documento</h2>
    <input type="file" id="fileInput" accept=".docx,.xlsx"><br><br>
    <button onclick="uploadDoc()" class="btn-gold">Subir</button>
  </div>

  <!-- CONTACTO -->
  <div id="page-contacto" class="page" style="padding:40px">
    <h2>Contacto</h2>
    <form action="https://formspree.io/f/xzdwbgqn" method="POST" onsubmit="sendContact(event)">
      <input type="text" name="nombre" placeholder="Tu nombre" required><br><br>
      <input type="email" name="email" placeholder="Tu correo" required><br><br>
      <textarea name="mensaje" placeholder="Mensaje" required></textarea><br><br>
      <button type="submit" class="btn-gold">Enviar</button>
    </form>
  </div>
</div>

<script>
const PASSWORD = "mos2025";

window.addEventListener('load', () => {
  setTimeout(() => {
    document.getElementById('splash').style.opacity = '0';
    setTimeout(() => {
      document.getElementById('splash').style.display = 'none';
      document.getElementById('loginScreen').style.display = 'flex';
    }, 600);
  }, 1400);
});

function doLogin() {
  if (document.getElementById('loginPass').value === PASSWORD) {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
  } else {
    document.getElementById('loginErr').style.display = 'block';
  }
}

function showPage(page) {
  document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
  document.getElementById('page-' + page).style.display = 'block';
}

function uploadDoc() {
  alert("Archivo subido (guardado en navegador)");
}

async function sendContact(e) {
  e.preventDefault();
  alert("✅ Mensaje enviado correctamente (Formspree configurado)");
  e.target.reset();
}
</script>
</body>
</html>
