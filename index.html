<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>

  <title>Ricardo Zelaya — Portafolio MOS 2026</title>
  <link rel="icon" id="favicon" type="image/png"/>
  
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>

    body{font-family:'DM Sans',sans-serif;background:#FAF7F0;color:#0D1B2A}
    h1,h2{font-family:'Playfair Display',serif}
    .btn-gold{background:var(--gold);color:#0D1B2A;padding:14px 32px;border:none;border-radius:50px;font-weight:700;cursor:pointer}
  </style>
</head>
<body>

<!-- SPLASH -->
<div id="splash" style="position:fixed;inset:0;background:#0D1B2A;color:white;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;transition:opacity 0.6s">
  <div style="width:110px;height:110px;border-radius:50%;background:linear-gradient(135deg,#C9A84C,#E8D4A0);display:flex;align-items:center;justify-content:center;font-size:3.5rem;font-weight:900">RZ</div>
  <p style="margin-top:25px;letter-spacing:4px;font-size:1.1rem">PORTAFOLIO MOS 2026</p>
</div>

<!-- LOGIN -->
<div id="loginScreen" style="display:none;min-height:100vh;background:linear-gradient(135deg,#060f1e,#0D1B2A);align-items:center;justify-content:center">
  <div style="background:white;padding:40px;border-radius:20px;width:90%;max-width:400px;text-align:center">
    <h2>Iniciar Sesión</h2>
    <input type="password" id="loginPass" placeholder="Ingresa la contraseña" style="width:100%;padding:15px;margin:20px 0;border:1px solid #ddd;border-radius:10px;font-size:1.1rem"/>
    <button onclick="doLogin()" class="btn-gold" style="width:100%">Entrar</button>
    <p id="loginErr" style="color:red;margin-top:10px;display:none">❌ Contraseña incorrecta</p>
  </div>
</div>

<!-- APP -->
<div id="app" style="display:none">
  <header style="position:fixed;top:0;width:100%;background:rgba(250,247,240,0.95);backdrop-filter:blur(10px);padding:1rem 2rem;display:flex;justify-content:space-between;align-items:center;z-index:100">
    <strong>Ricardo Zelaya - MOS 2026</strong>
    <div>
      <button onclick="showPage('home')" class="btn-gold" style="margin:0 5px">Inicio</button>
      <button onclick="showPage('descargas')" class="btn-gold" style="margin:0 5px">Documentos</button>
      <button onclick="showPage('subir')" class="btn-gold" style="margin:0 5px">Subir</button>
    </div>
  </header>

  <!-- HOME -->
  <div id="page-home" class="page active" style="padding-top:100px;text-align:center">
    <h1 style="font-size:3.5rem">RICARDO <span style="color:var(--gold)">ZELAYA</span></h1>
    <p style="font-size:1.4rem">Portafolio Profesional MOS 2026</p>
  </div>

  <!-- DESCARGAS -->
  <div id="page-descargas" class="page" style="padding-top:100px;padding:20px;display:none">
    <h2 style="text-align:center">Mis Documentos</h2>
    <div id="docsGrid" style="max-width:1200px;margin:30px auto;display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:20px"></div>
  </div>

  <!-- SUBIR -->
  <div id="page-subir" class="page" style="padding-top:100px;padding:20px;display:none;max-width:700px;margin:auto">
    <h2>Subir Documento</h2>
    <input type="file" id="fileInput" accept=".docx,.xlsx" style="margin:20px 0"><br><br>
    <input type="text" id="titulo" placeholder="Título del documento" style="width:100%;padding:12px;margin-bottom:15px"><br>
    <button onclick="uploadToSupabase()" class="btn-gold" style="width:100%">Subir a Supabase</button>
  </div>
</div>

<script>

const supabaseUrl = 'https://mvzwipqnzeqvnbkkbshn.supabase.co';

// ==================== SPLASH ====================
window.addEventListener('load', () => {
  console.log("✅ Página cargada correctamente");
  setTimeout(() => {
    document.getElementById('splash').style.opacity = '0';
    setTimeout(() => {
      document.getElementById('splash').style.display = 'none';
      document.getElementById('loginScreen').style.display = 'flex';
    }, 600);
  }, 1400);
});

// ==================== LOGIN ====================
function doLogin() {
  if (document.getElementById('loginPass').value === PASSWORD) {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    showPage('home');
  } else {
    document.getElementById('loginErr').style.display = 'block';
  }
}

// ==================== NAV ====================
function showPage(page) {
  document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
  const activePage = document.getElementById('page-' + page);
  if (activePage) activePage.style.display = 'block';
}

</body>
</html>
